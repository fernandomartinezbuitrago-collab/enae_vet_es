<script>
    // 1. Generar un ID de sesión único al cargar la página
    const sessionId = Math.random().toString(36).substring(2, 15);

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const messages = document.getElementById('messages');
        const text = input.value.trim();

        if (!text) return;

        // Mostrar tu mensaje
        messages.innerHTML += `<p><strong>Tú:</strong> ${text}</p>`;
        input.value = '';
        messages.scrollTop = messages.scrollHeight;

        try {
            // 2. Enviar el mensaje Y el ID de sesión
            const response = await fetch('/chat/test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    session_id: sessionId, // <-- NUEVO
                    message: text 
                })
            });

            if (!response.ok) throw new Error("El servidor devolvió error " + response.status);

            const data = await response.json();
            messages.innerHTML += `<p><strong>Bot:</strong> ${data.response}</p>`;
            
        } catch (error) {
            messages.innerHTML += `<p style="color:red;"><strong>Error:</strong> No pude conectar con el servidor.</p>`;
            console.error("Error en el chat:", error);
        }
        messages.scrollTop = messages.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
